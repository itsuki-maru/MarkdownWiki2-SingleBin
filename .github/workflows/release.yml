name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_IP_ADDRESS: ""
  VITE_ASSET_PATH: "/assets/"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            src_frontend/frontend/package-lock.json
            src_frontend/frontend-admin/package-lock.json
            src_frontend/frontend-mobile/package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          npm ci --prefix src_frontend/frontend
          npm ci --prefix src_frontend/frontend-mobile
          npm ci --prefix src_frontend/frontend-admin

      - name: Generate CI .env
        shell: pwsh
        run: |
          @"
          DATABASE_URL=sqlite:./ci-build.sqlite
          CREATEDATABASE_PATH=./ci-build.sqlite
          VITE_IP_ADDRESS=
          VITE_ASSET_PATH=/assets/
          "@ | Set-Content -Path .env -Encoding UTF8

      - name: Install SQLx CLI
        shell: pwsh
        run: cargo install sqlx-cli --no-default-features --features sqlite

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Create SQLite database and run migrations
        shell: pwsh
        run: |
          sqlx database create
          sqlx migrate run

      - name: Install Tauri CLI
        shell: pwsh
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build frontend bundles
        shell: pwsh
        run: ./src_frontend/scripts/frontends-builder.ps1

      - name: Build Tauri app
        shell: pwsh
        run: cargo tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-pkg | Out-Null
          Get-ChildItem target\release\bundle -Recurse -Include *.exe, *.msi |
            Where-Object { $_.FullName -notmatch '\\(deps|debug)\\' } |
            Copy-Item -Destination release-pkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release-pkg/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts

      - name: List collected files
        run: ls -lh artifacts/

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          find . -maxdepth 1 -type f -exec sha256sum {} + > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: MarkdownWiki2-SingleBin ${{ steps.tag.outputs.name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: artifacts/**
