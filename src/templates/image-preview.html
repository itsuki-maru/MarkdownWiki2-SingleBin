<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/assets/panzoom.min.js"></script>

  <title>MarkdownWiki2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #aaa;
    }

    .image-container {
      width: 100%;
      max-width: 1400px;
      aspect-ratio: 16 / 9;
      background-color: #aaa;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .image-container img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform 0.3s;
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .instructions {
      position: absolute;
      top: 15px;
      right: 10px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
    }

    #close-tab {
      cursor: pointer;
    }

    /* スマートフォン向けの調整 */
    @media (max-width: 768px) {
      .image-container {
        max-width: 100%;
        height: 100%;
        aspect-ratio: 9 / 16;

      }
    }

    /* タブレット向けの調整 */
    @media (max-width: 1024px) and (min-width: 769px) {
      .image-container {
        max-width: 100%;
        height: 100%;
        aspect-ratio: 4 / 3;
      }
    }

    #panzoom-element {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    #panzoom-element img {
      max-width: 100%;
      max-height: 100%;
      cursor: grab;
    }
  </style>
</head>

<body>
  <div class="image-container" id="image-container">
    <div id="panzoom-element">
      <img src="{{ url }}" alt="Preview" id="preview-image" alt="Preview" class="zoom-image">
    </div>
    <div class="instructions" id="close-tab">閉じる</div>
  </div>
</body>
<script>
  const previewImage = document.getElementById("preview-image");
  const imageContainer = document.getElementById("image-container");
  document.getElementById("close-tab").addEventListener("click", () => {
    // タブを閉じる
    callParentImagePreview();
  });

  const panzoomElement = document.getElementById("panzoom-element");

  // Panzoomを初期化
  const panzoom = Panzoom(panzoomElement, {
    maxScale: 5, // 最大拡大率
    minScale: 1, // 最小縮小率
    contain: "outside", // 画像をコンテナ内に収める
  });

  // ホイール操作でズームを有効化
  panzoomElement.parentElement.addEventListener("wheel", panzoom.zoomWithWheel);

  // 親要素で画像プレビューをクローズ
  function callParentImagePreview() {
      window.parent.postMessage({ type: "callParentImagePreview", message: "" }, "*");
  }
</script>
</html>
