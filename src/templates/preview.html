    <script>
        const renderer = new marked.Renderer();

        // 画像の横幅を指定できるようにimgタグをカスタム
        const originalImageRenderer = renderer.image;
        renderer.image = (tokens) => {
            let width = "";
            let href = tokens.href;
            let text = tokens.text;
            const match = tokens.href.match(/\s*=(\d+)(x)?$/);
            if (match) {
                width = match[1];
                href = href.replace(/\s*=.*$/, "");
            }
            const widthAttr = width ? ` width="${width}px"` : "";
            console.log(href, widthAttr);
            return `<img src="${href}" alt="${text}" ${widthAttr}>`;
        };

        // codeタグの処理
        const originalCodeRenderer = renderer.code;
        renderer.code = (tokens) => {
            let html = originalCodeRenderer.call(this, tokens);
            // mermaidの処理
            if (tokens.lang == "mermaid") {
                return (
                    '<pre class="mermaid">' +
                    escapeHtml(tokens.text) +
                    "\n</pre>"
                );

                // 通常のコードブロック + コピー機能
            } else {
                const id = `code-${Math.random().toString(36).substr(2, 9)}`;
                const lang = tokens.lang;
                const escapedCode = escapeHtml(tokens.text);
                return `
            <div class="code-container" style="position: relative;">
                <button class="copy-btn" data-target="${id}" style="position: absolute; top: 5px; right: 5px; z-index: 1;">コピー</button>
                <pre><code id="${id}" class="language-${lang}">${escapedCode}</code></pre>
            </div>
            `;
            }
        };

        // videoカスタムトークンの追加
        const videoToken = {
            name: "video",
            level: "inline",
            start(src) {
                return src.match(/\?\[.*\]\(.*\)/)?.index;
            },

            tokenizer(src, tokens) {
                const rule = /^\?\[(.*?)\]\((.*?)\)/;
                const match = rule.exec(src);
                if (match) {
                    return {
                        type: "video",
                        raw: match[0],
                        text: match[1],
                        href: match[2],
                        tokens: this.lexer.inlineTokens(match[1], []),
                    };
                }
            },
            renderer(token) {
                return `<video controls src="${token.href}">${token.text}</video>`;
            },
        };

        // ネスト対応トークナイザの共通関数
        function createNestedTokenizer(typeName) {
            const self = this.lexer;
            return {
                name: typeName,
                level: "block",
                start(src) {
                    const re = new RegExp(`^:::${typeName}\\s`, "m");
                    return src.match(re)?.index;
                },
                tokenizer(src, tokens) {
                    if (!src.startsWith(`:::${typeName}`)) return null;

                    const lines = src.split(/\r?\n/);
                    let nestLevel = 0;
                    let endIndex = -1;

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (/^:::(\w+)/.test(line)) {
                            nestLevel++;
                        } else if (/^:::\s*$/.test(line)) {
                            nestLevel--;
                            if (nestLevel === 0) {
                                endIndex = i;
                                break;
                            }
                        }
                    }

                    if (endIndex === -1) return null;

                    const rawLines = lines.slice(0, endIndex + 1);
                    const raw = rawLines.join("\n");

                    const titleMatch = lines[0].match(
                        new RegExp(`^:::${typeName}\\s+(.+)`),
                    );
                    const title = titleMatch
                        ? titleMatch[1].trim()
                        : typeName.toUpperCase();

                    const content = lines.slice(1, endIndex).join("\n");

                    return {
                        type: typeName,
                        raw,
                        title,
                        tokens: this.lexer.blockTokens(content),
                    };
                },
                renderer(token) {
                    const body = marked.parser(token.tokens);
                    if (token.type === "details") {
                        return `<details>\n<summary>${token.title}</summary>\n${body}\n</details>\n`;
                    } else {
                        return `<div class="box ${token.type}">\n<summary>${token.title}</summary>\n${body}\n</div>\n`;
                    }
                },
            };
        }

        // それぞれのトークンを生成
        const detailsToken = createNestedTokenizer("details");
        const noteToken = createNestedTokenizer("note");
        const warningToken = createNestedTokenizer("warning");

        // KaTeX対応
        const mathExtentionToken = {
            name: "math",
            level: "inline",
            start(src) {
                return src.match(/\$+/)?.index;
            },
            tokenizer(src, _tokens) {
                const blockMath = /^\$\$([^$]+)\$\$/; // $$...$$
                const inlineMath = /^\$([^$\n]+)\$/; // $...$
                const blockMatch = blockMath.exec(src);
                if (blockMatch) {
                    return {
                        type: "math",
                        raw: blockMatch[0],
                        text: blockMatch[1],
                        displayMode: true,
                    };
                }
                const inlineMatch = inlineMath.exec(src);
                if (inlineMatch) {
                    return {
                        type: "math",
                        raw: inlineMatch[0],
                        text: inlineMatch[1],
                        displayMode: false,
                    };
                }
                return null;
            },
            renderer(token) {
                try {
                    return katex.renderToString(token.text, {
                        throwOnError: false,
                        displayMode: token.displayMode,
                        output: "html",
                    });
                } catch (error) {
                    return token.text;
                }
            },
        };

        // YouTube埋め込み対応
        const youtubeToken = {
            name: "youtube",
            level: "inline",
            start(src) {
                return src.match(/\?\[.*\]\(.*\)/)?.index;
            },
            tokenizer(src, tokens) {
                const rule = /^\@\[(youtube)\]\((.*?)\)/;
                const match = rule.exec(src);
                if (match) {
                    const id = extractYouTubeId(match[2]);
                    if (!id) return null;
                    return {
                        type: "youtube", // カスタムトークンタイプ
                        raw: match[0],
                        text: id,
                        href: match[2],
                    };
                }
                return null;
            },
            renderer(token) {
                // 生iframeではなく、自前テンプレートにする（例：Web Component）
                return `<app-youtube video-id="${token.text}" data-src="${token.href}"></app-youtube>`;
            },
        };
        // 11文字のYouTube ID検証
        const ID_RE = /^[\w-]{11}$/;
        function extractYouTubeId(rawUrl) {
            try {
                const url = new URL(rawUrl);
                const host = url.hostname.toLowerCase();
                const allowYouTubeList = [
                    "www.youtube.com",
                    "youtube.com",
                    "m.youtube.com",
                    "youtu.be",
                    "www.youtube-nocookie.com",
                ];
                if (!allowYouTubeList.includes(host)) return null;

                // shorts / watch / youtu.be に対応
                if (host === "youtu.be") {
                    const id = url.pathname.slice(1);
                    return ID_RE.test(id) ? id : null;
                }
                if (url.pathname.startsWith("/shorts/")) {
                    const id = url.pathname.split("/")[2] ?? "";
                    return ID_RE.test(id) ? id : null;
                }
                if (url.pathname === "/watch") {
                    const id = url.searchParams.get("v") ?? "";
                    return ID_RE.test(id) ? id : null;
                }
                if (url.pathname.startsWith("/embed/")) {
                    const id = url.pathname.split("/")[2] ?? "";
                    return ID_RE.test(id) ? id : null;
                }
                return null;
            } catch {
                return null;
            }
        }

        // app-youtubeからiframeに置換
        function renderIframe(html) {
            return html.replace(
                /<app-youtube\s+[^>]*video-id=["']([\w-]{11})["'][^>]*>(?:<\/app-youtube>)?/g,
                (_, videoId) => {
                    const src = `https://www.youtube-nocookie.com/embed/${videoId}`;
                    return `
                <iframe
                    src="${src}"
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen
                    width="560" height="315"
                    style="border:0;"
                ></iframe>
                `.trim();
                },
            );
        }

        marked.use({
            extensions: [
                videoToken,
                detailsToken,
                noteToken,
                warningToken,
                mathExtentionToken,
                youtubeToken,
            ],
        });

        // HTMLエスケープ関数
        function escapeHtml(html) {
            return html
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // markedのスラッグ化機能をカスタマイズ
        let headingIndex = 0; // 見出しのインデックス
        renderer.heading = function (tokens) {
            const id = `heading-${headingIndex++}`; // インデックスに基づいてIDを生成
            return `<h${tokens.depth} id="${id}" class="head${tokens.depth}">${tokens.text}</h${tokens.depth}>\n`; // class属性のCSSはトップレベル（App.vue）で定義
        };

        // ローカルホスト判定
        function isLocalhost(url) {
            try {
                const parsedUrl = new URL(url);
                return (
                    parsedUrl.hostname === "localhost" ||
                    parsedUrl.hostname === "127.0.0.1" ||
                    parsedUrl.hostname === "[::1]"
                );
            } catch (e) {
                return false;
            }
        }

        // 拡張子でPDFファイルか判定する関数
        function isPDF(filename) {
            return /\.pdf$/i.test(filename);
        }

        // [テキスト](URL)で定義された外部リンクを別タブで開かせるカスタムレンダラ設定
        // 元のlink関数を保存
        const originalLinkRenderer = renderer.link.bind(renderer);
        // link関数をオーバーライド
        renderer.link = (tokens) => {
            // 外部リンクかどうかをチェック
            const isExternal = /^https?:\/\//.test(tokens.href);
            let isLocal = false;
            let isPDFHref = false;
            if (tokens.href) {
                isLocal = isLocalhost(tokens.href);
                isPDFHref = isPDF(tokens.href);
            }
            const html = originalLinkRenderer(tokens);
            if (isExternal) {
                if (isLocal && isPDFHref) {
                    return html.replace(
                        /^<a /,
                        '<a target="_blank" rel="noopener noreferrer" title="PDFリンク" ',
                    );
                }
                return html.replace(
                    /^<a /,
                    '<a target="_blank" rel="noopener noreferrer" title="外部リンク" ',
                );
            } else {
                // 内部リンクかつPDFの場合
                if (isPDFHref) {
                    return html.replace(
                        /^<a /,
                        '<a target="_blank" rel="noopener noreferrer" title="PDFリンク" ',
                    );
                }
                // 内部リンクの場合、元の処理を使用
                return originalLinkRenderer(tokens);
            }
        };

        // markedの設定をカスタマイズ
        marked.setOptions({
            renderer,
            async: false,
        });

        // XSSフィルタのカスタマイズ
        let xssOptions = {
            whiteList: {
                h1: ["id", "class"], // h1タグのid属性を許可 class属性を許可
                h2: ["id", "class"], // h2タグのid属性を許可 class属性を許可
                h3: ["id"], // h3タグのid属性を許可
                h4: ["id"], // h4タグのid属性を許可
                h5: ["id"], // h5タグのid属性を許可
                h6: ["id"], // h6タグのid属性を許可
                pre: ["class"],
                a: ["target", "rel", "href", "title"],
                button: ["class", "data-target"],
                img: ["src", "alt", "width"],
                video: ["src", "controls"],
                div: ["class"],
                p: ["class"],
                li: [],
                strong: [],
                ul: [],
                ol: [],
                li: [],
                blockquote: [],
                code: ["id", "class"],
                table: [],
                thead: [],
                tbody: [],
                th: [],
                td: [],
                tr: [],
                details: [],
                summary: [],
                span: ["class", "aria-hidden", "style"],
                "app-youtube": ["video-id", "data-src"],
                input: ["type", "checked", "data-start", "data-end"],
            },
            stripIgnoreTag: false,
            stripIgnoreTagBody: ["script"],
            // iframeの確認（念のため、iframeはここで不許可）
            onTag(tag, html) {
                if (tag === "iframe") return "Not Allow iframe ";
            },
            // Katexでサニタイズされてしまうスタイルを再定義
            css: {
                whiteList: {
                    height: true,
                    "margin-right": true,
                    top: true,
                    width: true,
                    "margin-left": true,
                    left: true,
                    right: true,
                    bottom: true,
                },
            },
        };

        // 見出しのテキストをIDに変換
        const createId = (index) => {
            return `heading-${index}`;
        };

        // 1行の中に三重引用符が出現した回数を返す
        const countBackticksInLine = (line) => {
            const matches = line.match(/```/g);
            return matches ? matches.length : 0;
        };

        // マークダウンデータから見出しの行を抽出する
        const getToc = (textBodyData) => {
            // コードブロック内かどうかを示すフラグ
            let inCodeBlock = false;
            // 入力文字列を行に分解
            const lines = textBodyData.split("\n");
            // 各行をループして、`#`で始まる行で、かつバッククォートの数が2個以下の行だけをフィルタリング
            const headings = lines.filter((line) => {
                const lenBackQoute = countBackticksInLine(line);
                if (lenBackQoute >= 2) {
                    return false;
                }
                if (line.trim().startsWith("```")) {
                    // コードブロックの開始または終了を切り替える
                    inCodeBlock = !inCodeBlock;
                    return false;
                }
                if (inCodeBlock) {
                    // コードブロック内の行は無視する
                    return false;
                }
                const match = line.match(/^#+/);
                return match;
            });
            return headings;
        };

        // 見出しの配列からマークダウンのリストを作成
        const createNestedList = (headings) => {
            let result = "";
            headings.forEach((heading, index) => {
                // '#'の数をカウント
                const level = heading.split(" ").shift().length;
                // '#'を除去
                let text = heading.replace(/#/g, "").trim();
                // '`'を除去
                text = text.replace(/`/g, "").trim();
                // インデントを付ける
                const indents = "  ".repeat(level - 1);

                const id = createId(index);
                // 目次のエントリにリンクを追加
                result += `${indents}- [${text}](#${id})\n`;
            });
            return result;
        };

        document.addEventListener("DOMContentLoaded", function () {
            const options = { async: false };

            const markdownContent = document
                .getElementById("markdown-content")
                .textContent.trim();
            const parsedHtml = marked.parse(markdownContent, options);
            const cleanHtml = filterXSS(parsedHtml, xssOptions);
            const renderHtml = renderIframe(cleanHtml);
            document.getElementById("main-content").innerHTML = renderHtml;

            const tocListString = getToc(markdownContent);
            const mdTocStr = createNestedList(tocListString);
            const tocHtml = marked.parse(mdTocStr, options);
            const cleanTocHtml = filterXSS(tocHtml, xssOptions);
            document.getElementById("toc").innerHTML = cleanTocHtml;

            Prism.highlightAll();

            // TOC アクティブリンク追跡
            (function () {
                const headings = document.querySelectorAll(
                    "#main-content h2, #main-content h3, #main-content h4, #main-content h5, #main-content h6",
                );
                const tocLinks = document.querySelectorAll("#toc a");
                if (tocLinks.length === 0 || headings.length === 0) return;

                let activeLink = null;
                let clickScrolling = false;
                let clickTimer = null;

                const setActive = (link) => {
                    if (activeLink) activeLink.classList.remove("active");
                    activeLink = link;
                    if (activeLink) activeLink.classList.add("active");
                };

                // クリック時は直ちにアクティブを設定し、スクロール完了まで Observer を抑制
                tocLinks.forEach((link) => {
                    link.addEventListener("click", () => {
                        setActive(link);
                        clickScrolling = true;
                        if (clickTimer) clearTimeout(clickTimer);

                        const resume = () => {
                            if (clickTimer) clearTimeout(clickTimer);
                            clickScrolling = false;
                        };

                        if ("onscrollend" in window) {
                            // scrollend: スクロール停止を正確に検知 (Chrome 114+, Firefox 109+)
                            window.addEventListener("scrollend", resume, {
                                once: true,
                            });
                            // フォールバック: スクロールが不要なクリックや scrollend 未発火に備える
                            clickTimer = setTimeout(resume, 2000);
                        } else {
                            // scroll + デバウンスでスクロール停止を検知
                            const onScroll = () => {
                                if (clickTimer) clearTimeout(clickTimer);
                                clickTimer = setTimeout(() => {
                                    window.removeEventListener(
                                        "scroll",
                                        onScroll,
                                    );
                                    resume();
                                }, 200);
                            };
                            window.addEventListener("scroll", onScroll);
                            clickTimer = setTimeout(() => {
                                window.removeEventListener("scroll", onScroll);
                                resume();
                            }, 2000);
                        }
                    });
                });

                const observer = new IntersectionObserver(
                    (entries) => {
                        if (clickScrolling) return;
                        for (const entry of entries) {
                            if (entry.isIntersecting) {
                                const id = entry.target.id;
                                const link = document.querySelector(
                                    `#toc a[href="#${id}"]`,
                                );
                                if (link) setActive(link);
                                break;
                            }
                        }
                    },
                    { rootMargin: "-10% 0px -80% 0px", threshold: 0 },
                );

                headings.forEach((h) => observer.observe(h));
            })();
        });

        document.addEventListener("click", (e) => {
            const target = e.target;
            if (target.classList.contains("copy-btn")) {
                const codeId = target.dataset.target;
                const codeElem = document.getElementById(codeId || "");
                if (codeElem) {
                    navigator.clipboard.writeText(codeElem.textContent || "");

                    // すでにメッセージがあれば削除
                    const existingTooltip =
                        target.parentElement?.querySelector(".copy-tooltip");
                    if (existingTooltip) existingTooltip.remove();

                    // メッセージを作成
                    const tooltip = document.createElement("div");
                    tooltip.textContent = "コピーしました";
                    tooltip.className = "copy-tooltip";

                    // ボタンの親要素（code-container）に追加
                    target.parentElement?.appendChild(tooltip);

                    // 一定時間後に非表示
                    setTimeout(() => {
                        tooltip.style.opacity = "0";
                        setTimeout(() => tooltip.remove(), 300);
                    }, 1000);
                }
            }
        });
        Prism.highlightAll();
    </script>
</html>
